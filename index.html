<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقات تهنئة العيد — عائلة السلطان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f2027, #1a3a2a, #0f2027);
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            padding: 20px 15px 40px;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: 'عيد مبارك';
            position: fixed;
            font-family: 'Tajawal', sans-serif;
            font-size: 120px;
            font-weight: 800;
            color: rgba(201,168,76,0.04);
            top: 5%;
            right: -30px;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
            transform: rotate(-25deg);
            letter-spacing: 10px;
        }

        body::after {
            content: 'كل عام وأنتم بخير';
            position: fixed;
            font-family: 'Tajawal', sans-serif;
            font-size: 90px;
            font-weight: 800;
            color: rgba(201,168,76,0.035);
            bottom: 8%;
            left: -20px;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
            transform: rotate(-20deg);
            letter-spacing: 8px;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 460px;
            margin: 0 auto;
        }

        .family-logo {
            position: fixed;
            top: 14px;
            right: 16px;
            z-index: 100;
            width: 90px;
            height: 90px;
            object-fit: contain;
            animation: logoGlow 3s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from { filter: drop-shadow(0 2px 12px rgba(201,168,76,0.3)); }
            to   { filter: drop-shadow(0 4px 22px rgba(201,168,76,0.7)); }
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #C9A84C;
            letter-spacing: 1px;
            text-shadow: 0 0 30px rgba(201,168,76,0.4);
        }

        .header .family-name {
            font-size: 20px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            margin-top: 6px;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 5px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to left, transparent, rgba(201,168,76,0.3), transparent);
            margin: 22px 0;
        }

        .counter-box {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 30px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .counter-box span {
            color: #C9A84C;
            font-weight: 800;
            font-size: 16px;
        }

        .input-group { margin-bottom: 14px; }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 17px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder { color: rgba(255,255,255,0.3); }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #C9A84C;
            background: rgba(255,255,255,0.1);
        }

        .input-group textarea { height: 80px; resize: none; font-size: 14px; }

        .btn-create {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #C9A84C, #e8c96d, #C9A84C);
            background-size: 200% auto;
            border: none;
            border-radius: 14px;
            color: #1a1a1a;
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 6px;
        }

        .btn-create:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201,168,76,0.4);
        }

        .btn-create:active { transform: translateY(0); }

        #result { margin-top: 28px; text-align: center; }

        #result img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .download-btn {
            display: inline-block;
            margin-top: 16px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 800;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(39,174,96,0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(39,174,96,0.4);
        }

        canvas { display: none; }
    </style>
</head>

<div class="container">
    <div class="header">
        <h1>🌙 بطاقات تهنئة العيد</h1>
        <div class="family-name">عائلة السلطان</div>
        <p>صمّم بطاقتك الخاصة في ثوانٍ</p>
        <div class="counter-box">🖨️ <span id="printCount">...</span></div>
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <input type="text" id="userName" placeholder="✍️ أدخل اسمك هنا..." maxlength="25">
    </div>

    <button class="btn-create" onclick="createCard()">🎉 صمّم بطاقتك الآن</button>

    <div id="result"></div>
</div>

<canvas id="cardCanvas"></canvas>

<script>
    const TEMPLATE_SRC   = 'https://raw.githubusercontent.com/majidsenani/alsultan_eid/main/eid2.jpg';
    const TEMPLATE_COLOR = '#C9A84C';
    const TEMPLATE_Y     = 0.84;
    const API_URL        = "https://sheetdb.io/api/v1/0t1ytwdhd4d51";

    // تحميل عدد الطباعات
    async function loadCount() {
        try {
            const res = await fetch(API_URL + '/count');
            const data = await res.json();
            document.getElementById('printCount').textContent = data.rows;
        } catch(e) {
            document.getElementById('printCount').textContent = '—';
        }
    }
    loadCount();

    // شعار العائلة للرسم على البطاقة
    const LOGO_IMG = new Image();
    LOGO_IMG.src = document.querySelector('.family-logo').src;

    async function createCard() {
        const name = document.getElementById('userName').value.trim();
        const note = '';

        if (!name) {
            const inp = document.getElementById('userName');
            inp.focus();
            inp.style.borderColor = '#e74c3c';
            setTimeout(() => inp.style.borderColor = '', 1500);
            return;
        }

        const btn = document.querySelector('.btn-create');
        btn.textContent = '⏳ جاري التصميم...';
        btn.disabled = true;

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                "الاسم": name
            })
        }).catch(() => {});

        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = TEMPLATE_SRC;

        img.onload = async function () {
            canvas.width  = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            await document.fonts.ready;

            const fontSize = Math.round(canvas.width * 0.065);
            ctx.font        = 'bold ' + fontSize + 'px Tajawal';
            ctx.textAlign   = 'center';
            ctx.fillStyle   = TEMPLATE_COLOR;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur  = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fillText(name, canvas.width / 2, canvas.height * TEMPLATE_Y);
            ctx.shadowColor = 'transparent';

            // رسم شعار العائلة في الزاوية العلوية اليمنى
            const logoSize = Math.round(canvas.width * 0.26);
            const margin   = Math.round(canvas.width * 0.03);
            if (LOGO_IMG.complete && LOGO_IMG.naturalWidth > 0) {
                ctx.drawImage(LOGO_IMG, canvas.width - logoSize - margin, margin, logoSize, logoSize);
            }

            const finalImage = canvas.toDataURL('image/png');
            document.getElementById('result').innerHTML =
                '<img src="' + finalImage + '" alt="بطاقة العيد"><br>' +
                '<a href="' + finalImage + '" download="Eid_Card_' + name + '.png" class="download-btn">⬇️ حفظ البطاقة</a>';

            btn.textContent = '🎉 صمّم بطاقتك الآن';
            btn.disabled = false;
            loadCount();
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        };

        img.onerror = function () {
            alert('حدث خطأ في تحميل القالب');
            btn.textContent = '🎉 صمّم بطاقتك الآن';
            btn.disabled = false;
        };
    }
</script>
</body>
</html>
